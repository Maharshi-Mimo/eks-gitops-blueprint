apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: deepspeed
  namespace: app
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Maharshi-Mimo/eks-gitops-blueprint.git
    targetRevision: main
    path: app/deepspeed
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: my-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground